<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exclusive Global Advisory</title>
    <script>
      (function () {
        var base = '/exclusive-global-advisory/';
        var path = window.location.pathname;
        if (path.indexOf(base) === 0) {
          var target = path.slice(base.length);
          var query = window.location.search ? '&' + window.location.search.slice(1) : '';
          window.location.replace(base + '?p=/' + target + query + window.location.hash);
        } else {
          window.location.replace(base);
        }
      })();
    </script>
  </head>
  <body></body>
</html>
